name: Check links

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10am UTC (offset from lint cron at 9am)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check source URLs
        run: python3 scripts/check-links.py

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Weekly link check: dead links found',
              body: 'The scheduled Monday link checker found dead source URLs. Run `python3 scripts/check-links.py` locally to see details.',
              labels: []
            })
